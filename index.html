<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NASSER | Premium Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0a0a0a;
    position:relative;
    padding:20px;
    overflow-x:hidden;
}

/* خلفية سوداء مع احمر داكن */
.bg{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:radial-gradient(circle at 50% 50%, #1a0a0a 0%, #000000 90%);
    z-index:0;
}

/* توهج احمر خفيف */
.red-glow{
    position:fixed;
    width:100%;
    height:100%;
    background:radial-gradient(circle at 50% 40%, rgba(180,20,30,0.12), transparent 70%);
    z-index:0;
    pointer-events:none;
}

/* فقاعات شفافة */
.bubble{
    position:fixed;
    background:rgba(255,255,255,0.02);
    border-radius:50%;
    backdrop-filter:blur(2px);
    animation:bubbleFloat 12s infinite ease-in-out;
    pointer-events:none;
    z-index:0;
    border:1px solid rgba(255,0,0,0.08);
}

@keyframes bubbleFloat{
    0%{ transform:translateY(0) scale(1); opacity:0.15; }
    50%{ transform:translateY(-30px) scale(1.05); opacity:0.3; }
    100%{ transform:translateY(0) scale(1); opacity:0.15; }
}

/* جزيئات */
.particle{
    position:fixed;
    width:2px;
    height:2px;
    background:rgba(255,50,50,0.4);
    border-radius:50%;
    animation:particleDrift 8s infinite linear;
    pointer-events:none;
    z-index:0;
}

@keyframes particleDrift{
    0%{ transform:translateY(100vh) translateX(0); opacity:0; }
    20%{ opacity:0.6; }
    80%{ opacity:0.3; }
    100%{ transform:translateY(-20vh) translateX(30px); opacity:0; }
}

/* ===== الحاوية الرئيسية ===== */
.main-card{
    position:relative;
    z-index:10;
    width:100%;
    max-width:520px;
    background:rgba(10,5,8,0.65);
    backdrop-filter:blur(16px);
    border-radius:48px;
    padding:45px 35px;
    border:2px solid transparent;
    background-clip:padding-box;
    animation:fadeIn 0.7s ease;
    box-shadow:0 30px 50px rgba(0,0,0,0.5);
}

/* رينبو على الحدود (احمر - ابيض - اسود) */
.rainbow-border{
    position:absolute;
    top:-2px;
    left:-2px;
    right:-2px;
    bottom:-2px;
    background:linear-gradient(
        135deg,
        #ff0000,
        #ffffff,
        #000000,
        #ff3333,
        #ffffff,
        #000000,
        #ff0000
    );
    background-size:300% 300%;
    border-radius:50px;
    z-index:-1;
    animation:rainbowFlow 5s ease infinite;
    opacity:0.9;
}

@keyframes rainbowFlow{
    0%{ background-position:0% 50%; opacity:0.7; }
    25%{ background-position:50% 50%; opacity:1; }
    50%{ background-position:100% 50%; opacity:0.9; }
    75%{ background-position:50% 50%; opacity:1; }
    100%{ background-position:0% 50%; opacity:0.7; }
}

/* ===== الاسم (قابل للنقر) ===== */
.name-wrapper{
    text-align:center;
    cursor:pointer;
    transition:0.2s;
    position:relative;
}

.name-wrapper:hover{
    transform:scale(1.02);
}

.name{
    font-size:4rem;
    font-weight:800;
    letter-spacing:6px;
    background:linear-gradient(135deg, #ffffff, #ff4444, #ffffff);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-shadow:0 0 30px rgba(255,0,0,0.3);
}

.name-letter{
    display:inline-block;
    transition:0.2s;
}

.name-wrapper:hover .name-letter{
    animation:none;
}

.click-hint{
    font-size:0.6rem;
    color:#ff4444;
    margin-top:5px;
    opacity:0.5;
    letter-spacing:2px;
}

.sub{
    text-align:center;
    color:#888;
    font-size:0.7rem;
    letter-spacing:8px;
    margin-top:8px;
    margin-bottom:30px;
    font-weight:400;
}

/* ===== الأزرار ===== */
.links{
    display:flex;
    flex-direction:column;
    gap:14px;
    margin-bottom:25px;
}

.social-btn{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 22px;
    background:rgba(15,10,12,0.7);
    border:1px solid rgba(255,50,50,0.2);
    border-radius:50px;
    text-decoration:none;
    transition:all 0.3s ease;
    cursor:pointer;
}

.btn-text{
    color:#e0e0e0;
    font-weight:500;
    font-size:0.95rem;
    letter-spacing:0.5px;
}

.btn-arrow{
    color:#ff4444;
    font-size:1rem;
    transition:0.3s;
}

.social-btn:hover{
    background:rgba(40,20,25,0.9);
    border-color:rgba(255,80,80,0.5);
    transform:translateX(-5px);
    box-shadow:0 5px 15px rgba(255,0,0,0.1);
}

.social-btn:hover .btn-arrow{
    color:#ff8888;
    transform:translateX(-3px);
}

/* ===== تذييل عام ===== */
.footer-stats{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:20px;
    padding-top:15px;
    border-top:1px solid rgba(255,50,50,0.15);
}

.footer-item{
    text-align:center;
}

.footer-number{
    font-size:0.75rem;
    font-weight:700;
    color:#ff8888;
}

.footer-label{
    font-size:0.55rem;
    color:#666;
    letter-spacing:1px;
}

/* ===== لوحة التحكم المخفية (تظهر عند الضغط على N) ===== */
.admin-overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    backdrop-filter:blur(12px);
    z-index:200;
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    visibility:hidden;
    transition:0.3s;
}

.admin-overlay.active{
    opacity:1;
    visibility:visible;
}

.admin-panel{
    background:rgba(15,10,12,0.95);
    border-radius:40px;
    padding:30px;
    width:90%;
    max-width:450px;
    border:1px solid rgba(255,50,50,0.3);
    box-shadow:0 0 40px rgba(255,0,0,0.15);
    transform:scale(0.95);
    transition:0.3s;
}

.admin-overlay.active .admin-panel{
    transform:scale(1);
}

.panel-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    padding-bottom:15px;
    border-bottom:1px solid rgba(255,50,50,0.2);
}

.panel-title{
    font-size:1.1rem;
    font-weight:700;
    color:#ff4444;
    letter-spacing:2px;
}

.close-panel{
    background:rgba(255,50,50,0.15);
    border:none;
    color:#ff8888;
    font-size:1.2rem;
    width:32px;
    height:32px;
    border-radius:50%;
    cursor:pointer;
    transition:0.2s;
}

.close-panel:hover{
    background:rgba(255,50,50,0.3);
    color:#fff;
}

/* إحصائيات اللوحة */
.panel-stats{
    display:flex;
    flex-direction:column;
    gap:15px;
    margin-bottom:25px;
}

.stat-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 15px;
    background:rgba(0,0,0,0.4);
    border-radius:20px;
    border-left:3px solid #ff4444;
}

.stat-label{
    color:#aaa;
    font-size:0.8rem;
    font-weight:500;
}

.stat-value{
    color:#fff;
    font-size:1.1rem;
    font-weight:700;
}

.country-list{
    max-height:200px;
    overflow-y:auto;
}

.country-item{
    display:flex;
    justify-content:space-between;
    padding:8px 12px;
    border-bottom:1px solid rgba(255,50,50,0.1);
    font-size:0.8rem;
}

.country-name{
    color:#ddd;
}

.country-count{
    color:#ff6666;
    font-weight:600;
}

.reset-admin-btn{
    width:100%;
    margin-top:15px;
    padding:10px;
    background:rgba(255,50,50,0.1);
    border:1px solid rgba(255,50,50,0.3);
    border-radius:30px;
    color:#ff6666;
    font-size:0.75rem;
    cursor:pointer;
    transition:0.2s;
    font-weight:600;
}

.reset-admin-btn:hover{
    background:rgba(255,50,50,0.2);
    color:#ff8888;
}

/* نافذة كلمة المرور المدمجة */
.password-modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    backdrop-filter:blur(8px);
    z-index:150;
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    visibility:hidden;
    transition:0.25s;
}

.password-modal.active{
    opacity:1;
    visibility:visible;
}

.password-box{
    background:rgba(15,10,12,0.95);
    border-radius:32px;
    padding:30px;
    width:85%;
    max-width:320px;
    text-align:center;
    border:1px solid rgba(255,50,50,0.3);
}

.password-box h3{
    color:#fff;
    margin-bottom:10px;
}

.password-box p{
    color:#888;
    font-size:0.7rem;
    margin-bottom:20px;
}

.password-input{
    width:100%;
    padding:12px;
    background:rgba(0,0,0,0.5);
    border:1px solid rgba(255,50,50,0.3);
    border-radius:40px;
    color:#fff;
    text-align:center;
    font-size:1rem;
    margin-bottom:20px;
    outline:none;
}

.password-input:focus{
    border-color:#ff4444;
}

.password-btn{
    padding:10px 25px;
    background:#ff4444;
    border:none;
    border-radius:40px;
    color:#fff;
    font-weight:600;
    cursor:pointer;
    transition:0.2s;
}

.password-btn:hover{
    background:#ff6666;
    transform:scale(1.02);
}

.error-msg{
    color:#ff4444;
    font-size:0.7rem;
    margin-top:10px;
    display:none;
}

/* ===== نافذة التأكيد ===== */
.confirm-modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    backdrop-filter:blur(8px);
    z-index:100;
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    visibility:hidden;
    transition:0.25s;
}

.confirm-modal.active{
    opacity:1;
    visibility:visible;
}

.modal-content{
    background:rgba(15,10,12,0.95);
    border-radius:32px;
    padding:28px 24px;
    width:85%;
    max-width:320px;
    text-align:center;
    border:1px solid rgba(255,50,50,0.3);
}

.modal-icon{
    font-size:2rem;
    margin-bottom:12px;
}

.modal-title{
    color:#fff;
    font-size:1rem;
    font-weight:600;
    margin-bottom:8px;
}

.modal-link{
    color:#aaa;
    font-size:0.7rem;
    word-break:break-all;
    background:rgba(0,0,0,0.3);
    padding:8px;
    border-radius:12px;
    margin:15px 0;
}

.modal-buttons{
    display:flex;
    gap:12px;
    justify-content:center;
}

.modal-btn{
    padding:10px 24px;
    border-radius:40px;
    border:none;
    font-weight:600;
    cursor:pointer;
    transition:0.2s;
}

.modal-btn.confirm{
    background:#ff4444;
    color:#fff;
}

.modal-btn.confirm:hover{
    background:#ff6666;
}

.modal-btn.cancel{
    background:rgba(255,255,255,0.1);
    color:#fff;
}

/* ===== حركات ===== */
@keyframes fadeIn{
    from{ opacity:0; transform:translateY(25px); }
    to{ opacity:1; transform:translateY(0); }
}

@media (max-width: 550px){
    .main-card{ padding:30px 20px; }
    .name{ font-size:2.8rem; letter-spacing:3px; }
    .sub{ letter-spacing:5px; font-size:0.6rem; }
    .social-btn{ padding:11px 18px; }
    .btn-text{ font-size:0.85rem; }
}
</style>
</head>
<body>

<div id="bubblesContainer"></div>
<div id="particlesContainer"></div>
<div class="red-glow"></div>

<div class="main-card">
    <div class="rainbow-border"></div>
    
    <div class="name-wrapper" id="nasserName">
        <h1 class="name" id="clickableName">
            <span class="name-letter">𝐍</span><span class="name-letter">𝐚</span><span class="name-letter">𝐜</span><span class="name-letter">𝐜</span><span class="name-letter">𝐜</span><span class="name-letter">𝐫</span>
        </h1>
        <div class="click-hint"> </div>
    </div>
    <div class="sub">𝐂𝐨𝐧𝐭𝐞𝐧𝐭 𝐂𝐫𝐞𝐚𝐭𝐨𝐫</div>
    
    <div class="links" id="linksContainer"></div>
    
    <div class="footer-stats">
        <div class="footer-item">
            <div class="footer-number" id="deviceType">—</div>
            <div class="footer-label">DEVICE</div>
        </div>
        <div class="footer-item">
            <div class="footer-number" id="visitTime">—</div>
            <div class="footer-label">VISIT TIME</div>
        </div>
    </div>
</div>

<!-- نافذة التأكيد -->
<div class="confirm-modal" id="confirmModal">
    <div class="modal-content">
        <div class="modal-icon">❓</div>
        <div class="modal-title">Choose action</div>
        <div class="modal-link" id="modalLinkDisplay"></div>
        <div class="modal-buttons">
            <button class="modal-btn confirm" id="confirmYes">✓ Yes</button>
            <button class="modal-btn cancel" id="confirmNo">✗ No</button>
        </div>
    </div>
</div>

<!-- نافذة كلمة المرور -->
<div class="password-modal" id="passwordModal">
    <div class="password-box">
        <h3>🔒 OWNER ACCESS</h3>
        <p>Enter password to view analytics</p>
        <input type="password" class="password-input" id="passwordInput" placeholder="Password">
        <button class="password-btn" id="submitPassword">Verify</button>
        <div class="error-msg" id="passwordError">Incorrect password</div>
    </div>
</div>

<!-- لوحة التحكم الخاصة بالمالك -->
<div class="admin-overlay" id="adminOverlay">
    <div class="admin-panel">
        <div class="panel-header">
            <span class="panel-title">⚡ ANALYTICS DASHBOARD</span>
            <button class="close-panel" id="closeAdminPanel">✕</button>
        </div>
        <div class="panel-stats">
            <div class="stat-row">
                <span class="stat-label">TOTAL VISITORS</span>
                <span class="stat-value" id="totalVisitors">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">TOTAL CLICKS</span>
                <span class="stat-value" id="adminTotalClicks">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">TOTAL TIME SPENT</span>
                <span class="stat-value" id="totalTimeSpent">0 min</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">VISITORS BY COUNTRY</span>
                <span class="stat-value" id="countryCount">—</span>
            </div>
        </div>
        <div id="countryListContainer" class="country-list"></div>
        <button class="reset-admin-btn" id="resetAdminStats">⟳ RESET ALL STATS</button>
    </div>
</div>

<script>
// ========== كلمة المرور ==========
const ADMIN_PASSWORD = "nasardz2023";
let isAdmin = false;
let currentVisitorId = null;

// ========== الروابط ==========
const socialLinks = [
    { name: "Instagram", url: "https://www.instagram.com/_uvxa?igsh=Yno4eDRlaDJsOWE4" },
    { name: "TikTok", url: "https://tiktok.com/@uvxa_" },
    { name: "Discord Server", url: "dsc.gg/salvafamily" },
    { name: "YouTube", url: "https://www.youtube.com/@N1xGm" },
    { name: "Telegram", url: "https://t.me/offsalva" }
];

// ========== إحصائيات ==========
let analytics = {
    totalVisitors: 0,
    totalClicks: 0,
    sessions: [],
    countries: {}
};

// تحميل البيانات
function loadAnalytics() {
    const saved = localStorage.getItem('nasser_analytics');
    if(saved) {
        try{
            const parsed = JSON.parse(saved);
            analytics.totalVisitors = parsed.totalVisitors || 0;
            analytics.totalClicks = parsed.totalClicks || 0;
            analytics.sessions = parsed.sessions || [];
            analytics.countries = parsed.countries || {};
        } catch(e){}
    }
    updateAdminDisplay();
}

// حفظ البيانات
function saveAnalytics() {
    localStorage.setItem('nasser_analytics', JSON.stringify(analytics));
}

// تسجيل زائر جديد
function registerVisitor() {
    // جلب البلد (محاكاة - في الواقع تحتاج API)
    fetch('https://ipapi.co/json/')
        .then(res => res.json())
        .then(data => {
            let country = data.country_name || data.country || "Unknown";
            if(country === "Unknown") country = "🌍 Unknown";
            
            if(analytics.countries[country]) {
                analytics.countries[country]++;
            } else {
                analytics.countries[country] = 1;
            }
            
            analytics.totalVisitors++;
            analytics.sessions.push({
                id: Date.now(),
                startTime: Date.now(),
                country: country
            });
            saveAnalytics();
            updateAdminDisplay();
        })
        .catch(() => {
            analytics.totalVisitors++;
            analytics.countries["🌍 Unknown"] = (analytics.countries["🌍 Unknown"] || 0) + 1;
            analytics.sessions.push({
                id: Date.now(),
                startTime: Date.now(),
                country: "🌍 Unknown"
            });
            saveAnalytics();
            updateAdminDisplay();
        });
}

// تحديث وقت الجلسة
function updateSessionTimeForVisitor() {
    if(currentVisitorId) {
        const session = analytics.sessions.find(s => s.id == currentVisitorId);
        if(session) {
            const elapsed = Math.floor((Date.now() - session.startTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            const totalSeconds = analytics.sessions.reduce((sum, s) => sum + Math.floor((Date.now() - s.startTime) / 1000), 0);
            const totalMinutes = Math.floor(totalSeconds / 60);
            document.getElementById('totalTimeSpent').innerText = totalMinutes + " min";
        }
    }
}

// تحديث عرض لوحة التحكم
function updateAdminDisplay() {
    if(!isAdmin) return;
    document.getElementById('totalVisitors').innerText = analytics.totalVisitors;
    document.getElementById('adminTotalClicks').innerText = analytics.totalClicks;
    
    const totalSeconds = analytics.sessions.reduce((sum, s) => sum + Math.floor((Date.now() - s.startTime) / 1000), 0);
    const totalMinutes = Math.floor(totalSeconds / 60);
    document.getElementById('totalTimeSpent').innerText = totalMinutes + " min";
    
    const countryContainer = document.getElementById('countryListContainer');
    countryContainer.innerHTML = '';
    const sortedCountries = Object.entries(analytics.countries).sort((a,b) => b[1] - a[1]);
    sortedCountries.forEach(([country, count]) => {
        const div = document.createElement('div');
        div.className = 'country-item';
        div.innerHTML = `<span class="country-name">${country}</span><span class="country-count">${count}</span>`;
        countryContainer.appendChild(div);
    });
    document.getElementById('countryCount').innerText = sortedCountries.length;
}

// إضافة click
function incrementClicks() {
    analytics.totalClicks++;
    saveAnalytics();
    if(isAdmin) updateAdminDisplay();
}

// عرض نافذة التأكيد
function showConfirmModal(url, element) {
    document.getElementById('modalLinkDisplay').innerText = url.replace('https://', '').replace('http://', '').substring(0, 40);
    document.getElementById('confirmModal').classList.add('active');
    
    const confirmYes = document.getElementById('confirmYes');
    const confirmNo = document.getElementById('confirmNo');
    
    const handlerYes = () => {
        incrementClicks();
        window.open(url, '_blank');
        hideConfirmModal();
        confirmYes.removeEventListener('click', handlerYes);
        confirmNo.removeEventListener('click', handlerNo);
    };
    
    const handlerNo = () => {
        hideConfirmModal();
        confirmYes.removeEventListener('click', handlerYes);
        confirmNo.removeEventListener('click', handlerNo);
    };
    
    confirmYes.addEventListener('click', handlerYes);
    confirmNo.addEventListener('click', handlerNo);
}

function hideConfirmModal() {
    document.getElementById('confirmModal').classList.remove('active');
}

// ========== بناء الأزرار ==========
function buildLinks() {
    const container = document.getElementById('linksContainer');
    container.innerHTML = '';
    
    socialLinks.forEach(link => {
        const btn = document.createElement('div');
        btn.className = 'social-btn';
        
        const textSpan = document.createElement('span');
        textSpan.className = 'btn-text';
        textSpan.innerText = link.name;
        
        const arrowSpan = document.createElement('span');
        arrowSpan.className = 'btn-arrow';
        arrowSpan.innerText = '→';
        
        btn.appendChild(textSpan);
        btn.appendChild(arrowSpan);
        
        btn.addEventListener('click', () => showConfirmModal(link.url, btn));
        container.appendChild(btn);
    });
}

// ========== فقاعات وجزيئات ==========
function createBubbles() {
    const container = document.getElementById('bubblesContainer');
    for(let i = 0; i < 20; i++) {
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        const size = Math.random() * 80 + 20;
        bubble.style.width = size + 'px';
        bubble.style.height = size + 'px';
        bubble.style.left = Math.random() * 100 + '%';
        bubble.style.bottom = Math.random() * 100 + '%';
        bubble.style.animationDelay = Math.random() * 8 + 's';
        bubble.style.animationDuration = (Math.random() * 10 + 8) + 's';
        container.appendChild(bubble);
    }
}

function createParticles() {
    const container = document.getElementById('particlesContainer');
    for(let i = 0; i < 50; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 12 + 's';
        particle.style.animationDuration = (Math.random() * 10 + 6) + 's';
        container.appendChild(particle);
    }
}

// ========== كشف الجهاز والوقت ==========
function detectDevice() {
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile/i.test(navigator.userAgent);
    document.getElementById('deviceType').innerHTML = isMobile ? '📱 MOBILE' : '💻 DESKTOP';
}

function setVisitTime() {
    const now = new Date();
    document.getElementById('visitTime').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
}

// ========== إظهار نافذة كلمة المرور عند الضغط على N ==========
function showPasswordModal() {
    document.getElementById('passwordModal').classList.add('active');
    document.getElementById('passwordInput').value = '';
    document.getElementById('passwordError').style.display = 'none';
}

function hidePasswordModal() {
    document.getElementById('passwordModal').classList.remove('active');
}

function checkPassword() {
    const password = document.getElementById('passwordInput').value;
    if(password === ADMIN_PASSWORD) {
        isAdmin = true;
        hidePasswordModal();
        document.getElementById('adminOverlay').classList.add('active');
        updateAdminDisplay();
        
        // تحديث الوقت كل ثانية
        setInterval(() => {
            if(isAdmin && document.getElementById('adminOverlay').classList.contains('active')) {
                updateSessionTimeForVisitor();
            }
        }, 1000);
    } else {
        document.getElementById('passwordError').style.display = 'block';
    }
}

function closeAdminPanel() {
    document.getElementById('adminOverlay').classList.remove('active');
}

function resetStats() {
    if(isAdmin && confirm("⚠️ RESET ALL STATISTICS?\nThis action cannot be undone!")) {
        analytics = {
            totalVisitors: 0,
            totalClicks: 0,
            sessions: [],
            countries: {}
        };
        currentVisitorId = Date.now();
        analytics.sessions.push({
            id: currentVisitorId,
            startTime: Date.now(),
            country: "🌍 Owner"
        });
        analytics.totalVisitors = 1;
        saveAnalytics();
        updateAdminDisplay();
    }
}

// ========== تشغيل ==========
window.addEventListener('DOMContentLoaded', () => {
    buildLinks();
    createBubbles();
    createParticles();
    detectDevice();
    setVisitTime();
    
    currentVisitorId = Date.now();
    loadAnalytics();
    registerVisitor();
    
    // المؤقت
    setInterval(() => {
        setVisitTime();
        if(isAdmin && document.getElementById('adminOverlay').classList.contains('active')) {
            updateSessionTimeForVisitor();
        }
    }, 1000);
    
    // أحداث
    document.getElementById('clickableName').addEventListener('click', showPasswordModal);
    document.getElementById('submitPassword').addEventListener('click', checkPassword);
    document.getElementById('closeAdminPanel').addEventListener('click', closeAdminPanel);
    document.getElementById('resetAdminStats').addEventListener('click', resetStats);
    document.getElementById('passwordInput').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') checkPassword();
    });
    document.getElementById('passwordModal').addEventListener('click', (e) => {
        if(e.target === document.getElementById('passwordModal')) hidePasswordModal();
    });
    document.getElementById('adminOverlay').addEventListener('click', (e) => {
        if(e.target === document.getElementById('adminOverlay')) closeAdminPanel();
    });
    
    console.log('%c✨ NASSER PREMIUM HUB | Click the N for analytics ✨', 'color: #ff4444; font-size: 12px;');
});
</script>
